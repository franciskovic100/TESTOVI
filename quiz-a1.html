<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEST NEMAČKI A1 REČI (Quiz)</title>
    <style>
      /* iOS/Safari ponekad menja veličinu teksta, ovo sprečava “iskačuće” fontove */
      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 18px;
      }

      .card {
        width: 520px;
        max-width: 100%;
        background: radial-gradient(circle at top left, #1d4ed8, #020617);
        border-radius: 18px;
        padding: 22px 20px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .brand {
        font-weight: 750;
        letter-spacing: 0.03em;
        font-size: 18px;
      }

      .pill {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #a5b4fc;
        border: 1px solid rgba(129, 140, 248, 0.6);
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.65);
        white-space: nowrap;
      }

      .meta {
        font-size: 13px;
        color: #9ca3af;
        margin: 2px 0 18px 0;
      }

      .qword {
        font-size: 40px;
        font-weight: 800;
        color: #f9fafb;
        margin-bottom: 10px;
      }

      .hint {
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 16px;
      }

      .answers {
        display: grid;
        gap: 10px;
      }

      .option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(2, 6, 23, 0.35);
      }

      .option input {
        transform: scale(1.1);
      }

      .option .letter {
        width: 30px;
        font-weight: 700;
        color: #a5b4fc;
        font-size: 14px;
      }

      .option .text {
        font-size: 16px;
        color: #e5e7eb;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
        touch-action: manipulation;
      }

      .primary {
        background: linear-gradient(135deg, #22c55e, #a3e635);
        color: #052e16;
      }

      .secondary {
        background: rgba(148, 163, 184, 0.18);
        color: #e5e7eb;
        border: 1px solid rgba(148, 163, 184, 0.25);
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 16px;
        align-items: center;
      }

      .feedback {
        margin-top: 14px;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(2, 6, 23, 0.35);
        color: #e5e7eb;
      }

      .correct {
        color: #86efac;
      }

      .wrong {
        color: #fca5a5;
      }

      .progress {
        font-size: 12px;
        color: #9ca3af;
      }

      .center {
        text-align: center;
      }

      .big-score {
        font-size: 44px;
        font-weight: 900;
        margin: 10px 0;
        color: #f9fafb;
      }

      /* iPhone: veći razmaci + dugmad jedno ispod drugog */
      @media (max-width: 480px) {
        body {
          padding: 12px;
        }

        .card {
          padding: 18px 14px;
          border-radius: 16px;
        }

        .qword {
          font-size: 34px;
        }

        .hint {
          font-size: 15px;
        }

        .option {
          padding: 16px 12px;
          border-radius: 14px;
        }

        .option .letter {
          width: 34px;
          font-size: 16px;
        }

        .option .text {
          font-size: 18px;
        }

        .row {
          flex-direction: column;
          align-items: stretch;
        }

        button {
          width: 100%;
          text-align: center;
          padding: 14px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="top">
        <div class="brand">TEST NEMAČKI A1 REČI</div>
        <div class="pill">20 reči • A1</div>
      </div>

      <div class="meta">
        Odgovori sa <b>A/B/C/D</b>. Posle svake reči dobijaš: <b>Tačno</b> ili <b>Netačno</b>.
      </div>

      <div id="jsStatus" class="progress" style="text-align: center; margin-top: 10px;">JS: učitava se…</div>

      <div id="progress" class="progress">Pitanje 1/20</div>

      <div id="quizView">
        <div class="qword" id="qWord">—</div>
        <div class="hint" id="qHint">Šta znači ova reč?</div>

        <div class="answers" id="answers"></div>

        <div class="row">
          <button class="primary" id="btnSubmit" type="button">Potvrdi</button>
          <button class="secondary" id="btnNext" type="button" style="display: none;">Dalje</button>
        </div>

        <div id="feedback" class="feedback" style="display: none;"></div>
      </div>

      <div id="resultView" class="center" style="display: none;">
        <div class="pill" style="margin-bottom: 10px;">Gotovo</div>
        <div class="big-score" id="scoreText">0 / 20</div>
        <div class="meta" id="resultDetails">Tačno: —</div>
        <div class="row" style="justify-content: center;">
          <button class="primary" id="btnRestart" type="button">Ponovo</button>
        </div>
      </div>
    </div>

    <script>
      // Ako ovo ostane "JS: učitava se…" na iPhone-u, znači da se skripta ne izvršava
      // (najčešće jer se fajl otvori kao preview, ne u Safari-ju).
      const jsStatusEl = document.getElementById("jsStatus");
      if (jsStatusEl) jsStatusEl.textContent = "JS: radi (stranica je aktivna).";

      const QUIZ = [
        {
          word: "machen",
          correct: "B",
          options: [
            { letter: "A", text: "citati" },
            { letter: "B", text: "praviti / raditi" },
            { letter: "C", text: "jesti" },
            { letter: "D", text: "spavati" },
          ],
          meaning: "machen = praviti / raditi"
        },
        {
          word: "essen",
          correct: "B",
          options: [
            { letter: "A", text: "piti" },
            { letter: "B", text: "jesti" },
            { letter: "C", text: "govoriti" },
            { letter: "D", text: "kupovati" }
          ],
          meaning: "essen = jesti"
        },
        {
          word: "trinken",
          correct: "A",
          options: [
            { letter: "A", text: "piti" },
            { letter: "B", text: "uciti" },
            { letter: "C", text: "raditi" },
            { letter: "D", text: "videti" }
          ],
          meaning: "trinken = piti"
        },
        {
          word: "lernen",
          correct: "A",
          options: [
            { letter: "A", text: "uciti" },
            { letter: "B", text: "kupovati" },
            { letter: "C", text: "gledati" },
            { letter: "D", text: "spavati" }
          ],
          meaning: "lernen = uciti"
        },
        {
          word: "sprechen",
          correct: "B",
          options: [
            { letter: "A", text: "gledati" },
            { letter: "B", text: "govoriti / pricati" },
            { letter: "C", text: "igrati" },
            { letter: "D", text: "spavati" }
          ],
          meaning: "sprechen = govoriti / pricati"
        },
        {
          word: "wohnen",
          correct: "A",
          options: [
            { letter: "A", text: "ziveti / stanovati" },
            { letter: "B", text: "voziti" },
            { letter: "C", text: "jesti" },
            { letter: "D", text: "pisati" }
          ],
          meaning: "wohnen = ziveti / stanovati"
        },
        {
          word: "kommen",
          correct: "B",
          options: [
            { letter: "A", text: "ici" },
            { letter: "B", text: "doci" },
            { letter: "C", text: "kupovati" },
            { letter: "D", text: "igrati" }
          ],
          meaning: "kommen = doci"
        },
        {
          word: "gehen",
          correct: "B",
          options: [
            { letter: "A", text: "voziti" },
            { letter: "B", text: "hodati / ici" },
            { letter: "C", text: "spavati" },
            { letter: "D", text: "spopkati" }
          ],
          meaning: "gehen = hodati / ici"
        },
        {
          word: "heißen",
          correct: "A",
          options: [
            { letter: "A", text: "zvati se" },
            { letter: "B", text: "trebati" },
            { letter: "C", text: "odgovoriti" },
            { letter: "D", text: "ziveti" }
          ],
          meaning: "heißen = zvati se"
        },
        {
          word: "kaufen",
          correct: "B",
          options: [
            { letter: "A", text: "pomoci" },
            { letter: "B", text: "kupovati" },
            { letter: "C", text: "pitati" },
            { letter: "D", text: "odgovarati" }
          ],
          meaning: "kaufen = kupovati"
        },
        {
          word: "sehen",
          correct: "A",
          options: [
            { letter: "A", text: "videti" },
            { letter: "B", text: "pisati" },
            { letter: "C", text: "jesti" },
            { letter: "D", text: "kupovati" }
          ],
          meaning: "sehen = videti"
        },
        {
          word: "brauchen",
          correct: "A",
          options: [
            { letter: "A", text: "trebati" },
            { letter: "B", text: "piti" },
            { letter: "C", text: "igrati" },
            { letter: "D", text: "spavati" }
          ],
          meaning: "brauchen = trebati"
        },
        {
          word: "arbeiten",
          correct: "A",
          options: [
            { letter: "A", text: "raditi" },
            { letter: "B", text: "uciti" },
            { letter: "C", text: "leteti" },
            { letter: "D", text: "govoriti" }
          ],
          meaning: "arbeiten = raditi"
        },
        {
          word: "spielen",
          correct: "A",
          options: [
            { letter: "A", text: "igrati" },
            { letter: "B", text: "hodati" },
            { letter: "C", text: "citati" },
            { letter: "D", text: "videti" }
          ],
          meaning: "spielen = igrati"
        },
        {
          word: "schreiben",
          correct: "A",
          options: [
            { letter: "A", text: "pisati" },
            { letter: "B", text: "spavati" },
            { letter: "C", text: "jesti" },
            { letter: "D", text: "govoriti" }
          ],
          meaning: "schreiben = pisati"
        },
        {
          word: "lesen",
          correct: "B",
          options: [
            { letter: "A", text: "uciti" },
            { letter: "B", text: "citati" },
            { letter: "C", text: "kupovati" },
            { letter: "D", text: "doci" }
          ],
          meaning: "lesen = citati"
        },
        {
          word: "helfen",
          correct: "A",
          options: [
            { letter: "A", text: "pomoci" },
            { letter: "B", text: "trebati" },
            { letter: "C", text: "pitati" },
            { letter: "D", text: "ziveti" }
          ],
          meaning: "helfen = pomoci"
        },
        {
          word: "fragen",
          correct: "A",
          options: [
            { letter: "A", text: "pitati" },
            { letter: "B", text: "odgovoriti" },
            { letter: "C", text: "pisati" },
            { letter: "D", text: "kupovati" }
          ],
          meaning: "fragen = pitati"
        },
        {
          word: "fahren",
          correct: "A",
          options: [
            { letter: "A", text: "voziti (autom)" },
            { letter: "B", text: "hodati" },
            { letter: "C", text: "leteti" },
            { letter: "D", text: "spavati" }
          ],
          meaning: "fahren = voziti"
        },
        {
          word: "antworten",
          correct: "A",
          options: [
            { letter: "A", text: "odgovoriti" },
            { letter: "B", text: "trebati" },
            { letter: "C", text: "pitati" },
            { letter: "D", text: "gledati" }
          ],
          meaning: "antworten = odgovoriti"
        },
      ];

      const els = {
        progress: document.getElementById("progress"),
        quizView: document.getElementById("quizView"),
        resultView: document.getElementById("resultView"),
        qWord: document.getElementById("qWord"),
        answers: document.getElementById("answers"),
        feedback: document.getElementById("feedback"),
        btnSubmit: document.getElementById("btnSubmit"),
        btnNext: document.getElementById("btnNext"),
        scoreText: document.getElementById("scoreText"),
        resultDetails: document.getElementById("resultDetails"),
        btnRestart: document.getElementById("btnRestart"),
      };

      let index = 0;
      let score = 0;
      let answered = false;

      function capFirst(s) {
        if (!s) return s;
        return s.charAt(0).toUpperCase() + s.slice(1);
      }

      function renderQuestion(i) {
        const q = QUIZ[i];
        answered = false;
        els.feedback.style.display = "none";
        els.feedback.textContent = "";
        els.btnNext.style.display = "none";
        els.btnSubmit.style.display = "inline-flex";

        els.progress.textContent = `Pitanje ${i + 1}/${QUIZ.length}`;
        els.qWord.textContent = capFirst(q.word);

        // Build options
        els.answers.innerHTML = "";
        for (const opt of q.options) {
          const id = `opt_${i}_${opt.letter}`;
          const label = document.createElement("label");
          label.className = "option";
          label.setAttribute("for", id);

          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = `q_${i}`;
          radio.id = id;
          radio.value = opt.letter;

          const letter = document.createElement("div");
          letter.className = "letter";
          letter.textContent = opt.letter;

          const text = document.createElement("div");
          text.className = "text";
          text.textContent = capFirst(opt.text);

          label.appendChild(radio);
          label.appendChild(letter);
          label.appendChild(text);
          els.answers.appendChild(label);
        }
      }

      function getSelected() {
        const checked = document.querySelector(`input[name="q_${index}"]:checked`);
        return checked ? checked.value : null;
      }

      function showFeedback(isCorrect, correctLetter, meaning, chosenLetter) {
        els.feedback.style.display = "block";
        const title = isCorrect ? "Tačno" : "Netačno";
        els.feedback.classList.remove("wrong", "correct");
        els.feedback.classList.add(isCorrect ? "correct" : "wrong");
        els.feedback.innerHTML = `${title}<br/><span style="color:#9ca3af;">${capFirst(meaning)}</span>`;
      }

      function goNext() {
        index += 1;
        if (index >= QUIZ.length) {
          els.quizView.style.display = "none";
          els.resultView.style.display = "block";
          els.scoreText.textContent = `${score} / ${QUIZ.length}`;
          const percent = Math.round((score / QUIZ.length) * 100);
          els.resultDetails.textContent = `Tačno: ${score}/${QUIZ.length}. Procenat: ${percent}%.`;
          return;
        }
        renderQuestion(index);
      }

      function submit() {
        if (answered) return;
        const chosen = getSelected();
        if (!chosen) {
          els.feedback.style.display = "block";
          els.feedback.classList.remove("correct", "wrong");
          els.feedback.classList.add("wrong");
          els.feedback.textContent = "Izaberi A/B/C/D pa klikni Potvrdi.";
          return;
        }

        const q = QUIZ[index];
        const correct = chosen === q.correct;
        if (correct) score += 1;
        answered = true;

        showFeedback(correct, q.correct, q.meaning, chosen);
        els.btnSubmit.style.display = "none";
        els.btnNext.style.display = "inline-flex";
      }

      els.btnSubmit.addEventListener("click", submit);
      els.btnNext.addEventListener("click", () => {
        if (!answered) return;
        goNext();
      });
      els.btnRestart.addEventListener("click", () => {
        index = 0;
        score = 0;
        els.resultView.style.display = "none";
        els.quizView.style.display = "block";
        renderQuestion(index);
      });

      // start
      renderQuestion(index);
    </script>
  </body>
</html>
